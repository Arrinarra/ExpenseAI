<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExpenseAI - Дашборд</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        body {
            background-color: #f8f9fa;
        }
        .navbar-brand {
            font-weight: bold;
            color: #667eea !important;
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 15px 15px 0 0 !important;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .table th {
            background-color: #f1f3f5;
        }
        .summary-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .summary-value {
            font-size: 1.8rem;
            font-weight: bold;
        }
        .summary-label {
            font-size: 1rem;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
        <div class="container">
            <span class="navbar-brand">💰 ExpenseAI</span>
            <div class="ms-auto d-flex align-items-center gap-2">
                <label for="displayCurrency" class="me-2 text-dark">Валюта:</label>
                <select id="displayCurrency" class="form-select form-select-sm w-auto">
                    <option value="USD">USD</option>
                    <option value="EUR">EUR</option>
                    <option value="RUB">RUB</option>
                    <option value="GBP">GBP</option>
                    <option value="JPY">JPY</option>
                </select>
                <label for="analyticsPeriod" class="me-2 text-dark">Период:</label>
                <select id="analyticsPeriod" class="form-select form-select-sm w-auto">
                    <option value="week">Неделя</option>
                    <option value="month" selected>Месяц</option>
                    <option value="year">Год</option>
                </select>
                <label for="analyticsCurrency" class="me-2 text-dark">Валюта графика:</label>
                <select id="analyticsCurrency" class="form-select form-select-sm w-auto">
                    <option value="USD">USD</option>
                    <option value="EUR">EUR</option>
                    <option value="RUB">RUB</option>
                    <option value="GBP">GBP</option>
                    <option value="JPY">JPY</option>
                </select>
                <button id="logoutBtn" class="btn btn-outline-danger btn-sm ms-3">Выйти</button>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <!-- Сводка -->
        <div class="row mb-4">
            <div class="col-md-4">
                <div class="summary-card">
                    <div class="summary-label">Доходы</div>
                    <div class="summary-value" id="totalIncome">0</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="summary-card">
                    <div class="summary-label">Расходы</div>
                    <div class="summary-value" id="totalExpense">0</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="summary-card">
                    <div class="summary-label">Баланс</div>
                    <div class="summary-value" id="balance">0</div>
                </div>
            </div>
        </div>

        <!-- Форма добавления транзакции -->
        <div class="card mb-4">
            <div class="card-header">
                <h5 class="mb-0">➕ Добавить транзакцию</h5>
            </div>
            <div class="card-body">
                <form id="transactionForm">
                    <div class="row">
                        <div class="col-md-3 mb-3">
                            <label for="amount" class="form-label">Сумма</label>
                            <input type="number" step="0.01" class="form-control" id="amount" placeholder="0.00" required>
                            <small class="text-muted">Отрицательная = расход</small>
                        </div>
                        <div class="col-md-2 mb-3">
                            <label for="currency" class="form-label">Валюта</label>
                            <select class="form-select" id="currency">
                                <option value="USD">USD</option>
                                <option value="EUR">EUR</option>
                                <option value="RUB">RUB</option>
                                <option value="GBP">GBP</option>
                                <option value="JPY">JPY</option>
                            </select>
                        </div>
                        <div class="col-md-3 mb-3">
                            <label for="category" class="form-label">Категория</label>
                            <select class="form-select" id="category" required>
                                <option value="">Выберите категорию</option>
                            </select>
                        </div>
                        <div class="col-md-2 mb-3">
                            <label for="date" class="form-label">Дата</label>
                            <input type="date" class="form-control" id="date" required>
                        </div>
                        <div class="col-md-2 mb-3">
                            <label for="description" class="form-label">Описание</label>
                            <input type="text" class="form-control" id="description" placeholder="Необязательно">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">Сохранить</button>
                </form>
            </div>
        </div>

        <!-- Таблица транзакций -->
        <div class="card mb-4">
            <div class="card-header">
                <h5 class="mb-0">📋 История операций</h5>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>Дата</th>
                                <th>Категория</th>
                                <th>Описание</th>
                                <th>Сумма</th>
                                <th>Валюта</th>
                                <th>Действия</th>
                            </tr>
                        </thead>
                        <tbody id="transactionsTable">
                            <tr><td colspan="6" class="text-center">Загрузка...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Блок графиков -->
        <div class="row mt-4">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">🥧 Расходы по категориям</h5>
                    </div>
                    <div class="card-body">
                        <canvas id="expenseChart" width="400" height="300"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h5 class="mb-0">📈 Динамика баланса</h5>
                    </div>
                    <div class="card-body">
                        <canvas id="trendChart" width="400" height="300"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Конфигурация
        const API_BASE = 'http://localhost:8000/api/v1';
        const token = localStorage.getItem('token');
        if (!token) {
            window.location.href = '/index.html';
        }

        let currentDisplayCurrency = 'USD';

        // Вспомогательная функция для запросов с авторизацией
        async function fetchWithAuth(url, options = {}) {
            options.headers = {
                ...options.headers,
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
            };
            const response = await fetch(url, options);
            if (response.status === 401) {
                localStorage.removeItem('token');
                window.location.href = '/index.html';
            }
            return response;
        }

        // Загрузка категорий
        async function loadCategories() {
            try {
                const response = await fetchWithAuth(`${API_BASE}/categories`);
                if (response.ok) {
                    const categories = await response.json();
                    const select = document.getElementById('category');
                    select.innerHTML = '<option value="">Выберите категорию</option>';
                    categories.forEach(cat => {
                        const option = document.createElement('option');
                        option.value = cat.id;
                        option.textContent = cat.name;
                        select.appendChild(option);
                    });
                }
            } catch (error) {
                console.error('Ошибка загрузки категорий:', error);
            }
        }

        // Загрузка транзакций
        async function loadTransactions() {
            try {
                const url = `${API_BASE}/transactions?base_currency=${currentDisplayCurrency}`;
                const response = await fetchWithAuth(url);
                if (response.ok) {
                    const transactions = await response.json();
                    const tbody = document.getElementById('transactionsTable');
                    tbody.innerHTML = '';
                    if (transactions.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="6" class="text-center">Нет транзакций</td></tr>';
                    } else {
                        transactions.forEach(tx => {
                            const row = tbody.insertRow();
                            row.insertCell().textContent = tx.date;
                            row.insertCell().textContent = tx.category_id; // позже заменить на имя категории
                            row.insertCell().textContent = tx.description || '';
                            const amountCell = row.insertCell();
                            let displayAmount = tx.converted_amount !== undefined ? tx.converted_amount : tx.amount;
                            amountCell.textContent = displayAmount.toFixed(2);
                            amountCell.style.color = tx.amount < 0 ? '#dc3545' : '#28a745';
                            row.insertCell().textContent = tx.currency;
                            const actionsCell = row.insertCell();
                            const deleteBtn = document.createElement('button');
                            deleteBtn.className = 'btn btn-sm btn-outline-danger';
                            deleteBtn.innerHTML = '🗑️';
                            deleteBtn.onclick = () => deleteTransaction(tx.id);
                            actionsCell.appendChild(deleteBtn);
                        });
                    }
                }
            } catch (error) {
                console.error('Ошибка загрузки транзакций:', error);
            }
        }

        // Загрузка сводки
        async function loadSummary() {
            try {
                const url = `${API_BASE}/summary/summary?period=month&base_currency=${currentDisplayCurrency}`;
                const response = await fetchWithAuth(url);
                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('totalIncome').textContent = data.total_income.toFixed(2);
                    document.getElementById('totalExpense').textContent = data.total_expense.toFixed(2);
                    document.getElementById('balance').textContent = data.balance.toFixed(2);
                }
            } catch (error) {
                console.error('Ошибка загрузки сводки:', error);
            }
        }

        // Обновление данных при смене валюты
        async function refreshData() {
            await loadTransactions();
            await loadSummary();
        }

        // Удаление транзакции
        async function deleteTransaction(id) {
            if (confirm('Удалить эту транзакцию?')) {
                try {
                    const response = await fetchWithAuth(`${API_BASE}/transactions/${id}`, {
                        method: 'DELETE'
                    });
                    if (response.ok) {
                        refreshData();
                        refreshCharts(); // обновить графики после удаления
                    } else {
                        alert('Ошибка при удалении');
                    }
                } catch (error) {
                    console.error('Ошибка удаления:', error);
                }
            }
        }

        // --- Графики ---
        let expenseChart = null;
        let trendChart = null;

        async function loadMonthlyAnalytics() {
            const period = document.getElementById('analyticsPeriod').value;
            const currency = document.getElementById('analyticsCurrency').value;
            const url = `${API_BASE}/analytics/monthly?period=${period}&currency=${currency}`;
            try {
                const response = await fetchWithAuth(url);
                if (response.ok) {
                    const responseData = await response.json();
                    console.log('Monthly analytics response:', responseData);
                    let items = responseData.data || [];
                    if (!Array.isArray(items) || items.length === 0) {
                        if (expenseChart) expenseChart.destroy();
                        expenseChart = null;
                        return;
                    }
                    // Извлекаем положительные суммы (abs) и пересчитываем проценты
                    const categories = items.map(item => item.category);
                    const totals = items.map(item => Math.abs(item.amount));  // берём модуль
                    const totalSum = totals.reduce((a, b) => a + b, 0);
                    const itemsWithPercent = items.map((item, idx) => ({
                        ...item,
                        percent: totalSum ? (totals[idx] / totalSum) * 100 : 0
                    }));
                    if (expenseChart) expenseChart.destroy();
                    const ctx = document.getElementById('expenseChart').getContext('2d');
                    expenseChart = new Chart(ctx, {
                        type: 'pie',
                        data: {
                            labels: categories,
                            datasets: [{
                                data: totals,
                                backgroundColor: ['#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF', '#FF9F40'],
                            }]
                        },
                        options: {
                            responsive: true,
                            plugins: {
                                tooltip: {
                                    callbacks: {
                                        label: (context) => {
                                            const label = context.label || '';
                                            const value = context.raw;
                                            const percent = itemsWithPercent[context.dataIndex].percent;
                                            if (percent !== undefined && !isNaN(percent)) {
                                                return `${label}: ${value.toFixed(2)} ${currency} (${percent.toFixed(1)}%)`;
                                            } else {
                                                return `${label}: ${value.toFixed(2)} ${currency}`;
                                            }
                                        }
                                    }
                                }
                            }
                        }
                    });
                }
            } catch (error) {
                console.error('Ошибка загрузки аналитики по категориям:', error);
            }
        }
        async function loadTrends() {
            const period = document.getElementById('analyticsPeriod').value;
            const currency = document.getElementById('analyticsCurrency').value;
            const url = `${API_BASE}/analytics/trends?period=${period}&currency=${currency}`;
            try {
                const response = await fetchWithAuth(url);
                if (response.ok) {
                    const responseData = await response.json();
                    console.log('Trends response:', responseData);
                    const items = responseData.data || [];
                    if (!Array.isArray(items)) {
                        console.error('Нет массива в responseData.data');
                        return;
                    }
                    const dates = items.map(item => item.date);
                    const balances = items.map(item => item.balance);
                    if (trendChart) trendChart.destroy();
                    const ctx = document.getElementById('trendChart').getContext('2d');
                    trendChart = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: dates,
                            datasets: [{
                                label: `Баланс (${currency})`,
                                data: balances,
                                borderColor: '#36A2EB',
                                backgroundColor: 'rgba(54, 162, 235, 0.2)',
                                tension: 0.1,
                                fill: true
                            }]
                        },
                        options: {
                            responsive: true,
                            scales: {
                                y: {
                                    beginAtZero: false,
                                    title: { display: true, text: `Сумма (${currency})` }
                                },
                                x: {
                                    title: { display: true, text: 'Дата' }
                                }
                            }
                        }
                    });
                }
            } catch (error) {
                console.error('Ошибка загрузки трендов:', error);
            }
        }

        async function refreshCharts() {
            await loadMonthlyAnalytics();
            await loadTrends();
        }

        // Обработчики формы и селекторов
        document.getElementById('transactionForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const amount = parseFloat(document.getElementById('amount').value);
            const currency = document.getElementById('currency').value;
            const category_id = parseInt(document.getElementById('category').value);
            const date = document.getElementById('date').value;
            const description = document.getElementById('description').value;

            if (!category_id) {
                alert('Выберите категорию');
                return;
            }

            const transactionData = { amount, currency, category_id, date, description };

            try {
                const response = await fetchWithAuth(`${API_BASE}/transactions`, {
                    method: 'POST',
                    body: JSON.stringify(transactionData)
                });
                if (response.ok) {
                    document.getElementById('transactionForm').reset();
                    refreshData();
                    refreshCharts();
                } else {
                    const err = await response.json();
                    alert('Ошибка: ' + (err.detail || 'Неизвестная ошибка'));
                }
            } catch (error) {
                alert('Ошибка соединения с сервером');
                console.error(error);
            }
        });

        document.getElementById('displayCurrency').addEventListener('change', (e) => {
            currentDisplayCurrency = e.target.value;
            refreshData();
            refreshCharts(); // обновить графики с новой валютой
        });

        document.getElementById('analyticsPeriod').addEventListener('change', refreshCharts);
        document.getElementById('analyticsCurrency').addEventListener('change', refreshCharts);

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('token');
            window.location.href = '/index.html';
        });

        // Инициализация при загрузке
        document.addEventListener('DOMContentLoaded', () => {
            loadCategories();
            refreshData();
            refreshCharts();
        });
    </script>
</body>
</html>
