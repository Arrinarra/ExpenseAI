<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExpenseAI - Личные финансы с ИИ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 15px 15px 0 0 !important;
            padding: 20px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 12px;
            font-weight: 600;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .nav-tabs .nav-link.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
        }
        .nav-tabs .nav-link {
            color: #667eea;
            font-weight: 500;
        }
        .alert {
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center mt-5">
            <div class="col-md-6">
                <div class="text-center mb-4">
                    <h1 class="text-white">💰 ExpenseAI</h1>
                    <p class="text-white-50">Умный трекинг финансов с AI-рекомендациями</p>
                </div>
                
                <div class="card">
                    <div class="card-header text-center">
                        <h4 class="mb-0">Добро пожаловать!</h4>
                    </div>
                    <div class="card-body p-4">
                        <!-- Tabs -->
                        <ul class="nav nav-tabs mb-4" id="authTabs" role="tablist">
                            <li class="nav-item" role="presentation">
                                <button class="nav-link active" id="login-tab" data-bs-toggle="tab" data-bs-target="#login" type="button" role="tab">Вход</button>
                            </li>
                            <li class="nav-item" role="presentation">
                                <button class="nav-link" id="register-tab" data-bs-toggle="tab" data-bs-target="#register" type="button" role="tab">Регистрация</button>
                            </li>
                        </ul>
                        
                        <!-- Alert for messages -->
                        <div id="alertMessage" class="alert d-none" role="alert"></div>
                        
                        <!-- Tab panes -->
                        <div class="tab-content">
                            <!-- Login Form -->
                            <div class="tab-pane fade show active" id="login" role="tabpanel">
                                <form id="loginForm">
                                    <div class="mb-3">
                                        <label for="loginEmail" class="form-label">Email</label>
                                        <input type="email" class="form-control" id="loginEmail" required>
                                    </div>
                                    <div class="mb-3">
                                        <label for="loginPassword" class="form-label">Пароль</label>
                                        <input type="password" class="form-control" id="loginPassword" required>
                                    </div>
                                    <button type="submit" class="btn btn-primary w-100">Войти</button>
                                </form>
                            </div>
                            
                            <!-- Register Form -->
                            <div class="tab-pane fade" id="register" role="tabpanel">
                                <form id="registerForm">
                                    <div class="mb-3">
                                        <label for="regFullName" class="form-label">Полное имя</label>
                                        <input type="text" class="form-control" id="regFullName" required>
                                    </div>
                                    <div class="mb-3">
                                        <label for="regEmail" class="form-label">Email</label>
                                        <input type="email" class="form-control" id="regEmail" required>
                                    </div>
                                    <div class="mb-3">
                                        <label for="regPassword" class="form-label">Пароль (мин. 8 символов)</label>
                                        <input type="password" class="form-control" id="regPassword" minlength="8" required>
                                    </div>
                                    <button type="submit" class="btn btn-primary w-100">Зарегистрироваться</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- API Status -->
                <div class="text-center mt-3">
                    <span class="badge bg-success">API статус: ✅ Онлайн</span>
                    <a href="http://localhost:8000/docs" target="_blank" class="badge bg-info text-dark ms-2">Swagger Docs</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Базовый URL бэкенда (FastAPI)
        const API_BASE = 'http://localhost:8000/api/v1';
        // Login form handler
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            try {
                const formData = new URLSearchParams();
                formData.append('username', email);
                formData.append('password', password);
                
                const response = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: formData
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showAlert('success', 'Успешный вход! Токен: ' + data.access_token.substring(0, 20) + '...');
                    localStorage.setItem('token', data.access_token);
                    // Перенаправление на дашборд после успешного входа
                    window.location.href = '/dashboard.html';
                } else {
                    showAlert('danger', data.detail || 'Ошибка входа');
                }
            } catch (error) {
                showAlert('danger', 'Ошибка соединения с сервером');
            }
        });
        
        // Register form handler
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const userData = {
                email: document.getElementById('regEmail').value,
                password: document.getElementById('regPassword').value,
                full_name: document.getElementById('regFullName').value
            };
            
            try {
                const response = await fetch(`${API_BASE}/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(userData)
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showAlert('success', 'Регистрация успешна! Теперь вы можете войти.');
                    // Switch to login tab
                    document.getElementById('login-tab').click();
                } else {
                    showAlert('danger', data.detail || 'Ошибка регистрации');
                }
            } catch (error) {
                showAlert('danger', 'Ошибка соединения с сервером');
            }
        });
        
        function showAlert(type, message) {
            const alert = document.getElementById('alertMessage');
            alert.className = `alert alert-${type}`;
            alert.textContent = message;
            alert.classList.remove('d-none');
            
            setTimeout(() => {
                alert.classList.add('d-none');
            }, 5000);
        }
    </script>
</body>
</html>
