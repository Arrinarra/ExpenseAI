services:
  postgres:
    image: postgres:15
    container_name: expenseai_postgres
    environment:
      POSTGRES_USER: expenseai_user
      POSTGRES_PASSWORD: expenseai_pass
      POSTGRES_DB: expenseai_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U expenseai_user -d expenseai_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: expenseai_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://expenseai_user:expenseai_pass@postgres:5432/expenseai_db
      SECRET_KEY: your-secret-key-change-in-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data: